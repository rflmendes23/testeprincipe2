<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEI BAJA SAE - TELEMETRIA</title>

<script src="https://cdn.rawgit.com/Mikhus/canvas-gauges/master/gauge.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
body{background:#000510 url('https://www.transparenttextures.com/patterns/stardust.png');color:white;font-family:'Orbitron',sans-serif;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.star-red{color:#ff0000;text-shadow:0 0 15px #ff0000,0 0 30px #ff0000;animation:shine 1.5s infinite alternate}
.star-yellow{color:#ffcc00;text-shadow:0 0 10px #ffcc00,0 0 20px #ffcc00;animation:shine 2s infinite alternate}
@keyframes shine{from{opacity:.6;transform:scale(.9)}to{opacity:1;transform:scale(1.1)}}
.glass-panel{background:rgba(10,20,40,.95);backdrop-filter:blur(10px);border:3px solid #0096ff;border-radius:30px;box-shadow:0 0 40px rgba(0,150,255,.4);padding:20px}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="loginWrapper">
<input type="password" id="password" placeholder="SENHA">
<button onclick="fazerLogin()">ENTRAR</button>
</div>

<div id="telemetryWrapper" class="hidden">
<canvas id="rpm-gauge"></canvas>
<canvas id="speed-gauge"></canvas>
<h3 id="v-motor">0°C</h3>
<h3 id="v-cvt">0°C</h3>
<canvas id="cSpeed"></canvas>
<canvas id="cRpm"></canvas>
<canvas id="cTemp"></canvas>
</div>

<script>
const PASS = "depoisteconto";

// 🔥 COLOQUE SUA URL AQUI
const GITHUB_RAW_URL = "https://raw.githubusercontent.com/SEU_USUARIO/SEU_REPO/main/telemetria.json";

let rpmG, speedG, chartS, chartR, chartT;
let isRec = true;
let dTotal = 0, vMax = 0;

function fazerLogin(){
if(document.getElementById('password').value === PASS){
document.getElementById('loginWrapper').classList.add('hidden');
document.getElementById('telemetryWrapper').classList.remove('hidden');
initDash();
}else{alert("Senha incorreta");}
}

function initDash(){

rpmG = new RadialGauge({
renderTo:'rpm-gauge',
width:250,height:250,
units:"RPM",
maxValue:5000,
colorNeedle:"#f00"
}).draw();

speedG = new RadialGauge({
renderTo:'speed-gauge',
width:250,height:250,
units:"KM/H",
maxValue:120,
colorNeedle:"#00b4ff"
}).draw();

chartS = createChart('cSpeed','#00b4ff');
chartR = createChart('cRpm','#ff0000');
chartT = createChart('cTemp','#ffcc00');

setInterval(loop,2000);
}

function createChart(id,color){
return new Chart(document.getElementById(id),{
type:'line',
data:{labels:[],datasets:[{data:[],borderColor:color,borderWidth:3,tension:0.3}]},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
});
}

async function loop(){
try{

const response = await fetch(GITHUB_RAW_URL + "?cache=" + new Date().getTime());
const data = await response.json();

const currentRpm = parseInt(data.rpm) || 0;
const currentSpeed = parseInt(data.velocidade) || 0;
const currentTemp = parseFloat(data.temperatura) || 0;

// Atualiza Gauges
rpmG.value = currentRpm;
speedG.value = currentSpeed;

// Atualiza Displays
document.getElementById('v-motor').innerText = currentTemp.toFixed(1)+"°C";
document.getElementById('v-cvt').innerText = (currentTemp-12).toFixed(1)+"°C";

if(isRec){

const now = new Date();
const timeStr = now.toLocaleTimeString();

updateChart(chartS,timeStr,currentSpeed);
updateChart(chartR,timeStr,currentRpm);
updateChart(chartT,timeStr,currentTemp);

dTotal += currentSpeed*0.0002;
if(currentSpeed > vMax) vMax = currentSpeed;
}

}catch(error){
console.log("Erro ao buscar dados:",error);
}
}

function updateChart(chart,label,value){
chart.data.labels.push(label);
chart.data.datasets[0].data.push(value);
if(chart.data.labels.length>20){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
}
chart.update();
}
</script>

</body>
</html>
